<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Outbreak Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #617083;
      --line: #dbe2ea;
      --blue: #2f6f9f;
      --teal: #15947e;
      --red: #b54242;
      --amber: #b7791f;
      --green: #2f855a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    header {
      padding: 28px clamp(16px, 4vw, 48px) 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 46px); line-height: 1.05; }
    .subtitle { margin: 0; max-width: 820px; color: var(--muted); font-size: 16px; line-height: 1.55; }
    main { padding: 24px clamp(16px, 4vw, 48px) 40px; }
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    button, input, select {
      font: inherit;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      min-height: 40px;
    }
    button { cursor: pointer; padding: 0 14px; }
    button.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    input, select { padding: 0 12px; }
    .filters { margin-left: auto; display: flex; gap: 10px; flex-wrap: wrap; }
    .view { display: none; }
    .view.active { display: block; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    .chart-wrap { min-height: 420px; position: relative; }
    .split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px 9px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }
    th { color: var(--muted); cursor: pointer; user-select: none; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #edf3f8;
      color: #23445d;
      font-size: 12px;
      white-space: nowrap;
    }
    .cfr-cell { min-width: 120px; }
    .cfr-track { height: 8px; width: 100%; background: #e8edf3; border-radius: 999px; overflow: hidden; }
    .cfr-fill { height: 100%; border-radius: 999px; }
    .source { color: var(--muted); }
    @media (max-width: 760px) {
      .filters { margin-left: 0; width: 100%; }
      input, select { width: 100%; }
      .split { grid-template-columns: 1fr; }
      .panel { padding: 12px; }
      table { min-width: 820px; }
      .table-scroll { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Outbreak Tracker</h1>
    <p class="subtitle">A public health dataset explorer for outbreaks, source reconciliation, and case fatality rates with confidence intervals.</p>
  </header>
  <main>
    <div class="toolbar">
      <div class="tabs" role="tablist" aria-label="Dashboard views">
        <button class="active" data-view="timeline" type="button">Timeline</button>
        <button data-view="cfr" type="button">CFR</button>
        <button data-view="strain" type="button">Strains</button>
        <button data-view="table" type="button">Table</button>
      </div>
      <div class="filters">
        <select id="diseaseFilter" aria-label="Disease filter"></select>
        <input id="searchFilter" type="search" placeholder="Search country, strain, source" aria-label="Search records">
      </div>
    </div>

    <section id="timeline" class="view active panel">
      <div class="chart-wrap"><canvas id="timelineChart"></canvas></div>
    </section>
    <section id="cfr" class="view panel">
      <div class="chart-wrap"><canvas id="cfrChart"></canvas></div>
    </section>
    <section id="strain" class="view">
      <div class="split">
        <div class="panel chart-wrap"><canvas id="strainCasesChart"></canvas></div>
        <div class="panel chart-wrap"><canvas id="strainCountChart"></canvas></div>
      </div>
    </section>
    <section id="table" class="view panel">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th data-sort="date">Date</th>
              <th data-sort="disease">Disease</th>
              <th data-sort="country">Country</th>
              <th data-sort="strain">Strain</th>
              <th data-sort="confirmed_cases">Cases</th>
              <th data-sort="deaths">Deaths</th>
              <th data-sort="cfr">CFR</th>
              <th data-sort="source_primary">Source</th>
            </tr>
          </thead>
          <tbody id="recordsBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const fallbackCsv = `disease,country,date,strain,confirmed_cases,suspected_cases,deaths,cfr,cfr_ci_lower,cfr_ci_upper,statistically_unreliable,is_provisional,data_conflict,source_primary,source,source_url,retrieved_at,updated_at,notes,ambiguous_fields
Ebola,DRC,1976-01-01,Zaire,318,,280,0.8805,0.8399,0.9120,false,false,false,CDC,CDC,https://www.cdc.gov/ebola/outbreaks/index.html,2026-05-19T00:00:00Z,1976-01-01,CDC Ebola outbreak history,
Ebola,West Africa,2014-01-01,Zaire,28646,,11323,0.3953,0.3896,0.4010,false,false,true,ECDC,ECDC,https://www.ecdc.europa.eu/,2026-05-19T00:00:00Z,2015-10-16,Ebola West Africa assessment,
Mpox,Global,2024-08-14,Clade Ib,22000,,1200,0.0545,0.0516,0.0576,false,true,false,WHO,WHO,https://www.who.int/emergencies/disease-outbreak-news,2026-05-19T00:00:00Z,2024-08-14,Mpox global situation,
Cholera,Dominican Republic,2011-07-22,Vibrio cholerae,5000,,75,0.0150,0.0120,0.0188,false,false,false,ECDC,ECDC,https://www.ecdc.europa.eu/,2026-05-19T00:00:00Z,2011-07-22,Travel-associated cholera risk,
Bird Flu,China,2013-04-12,A(H7N9),38,,10,0.2632,0.1478,0.4204,false,false,false,ECDC,ECDC,https://www.ecdc.europa.eu/,2026-05-19T00:00:00Z,2013-04-12,H7N9 rapid risk assessment,`;

    const chartInstances = {};
    let records = [];
    let sortState = { key: "date", direction: "asc" };

    document.querySelectorAll("[data-view]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-view]").forEach((b) => b.classList.toggle("active", b === button));
        document.querySelectorAll(".view").forEach((view) => view.classList.toggle("active", view.id === button.dataset.view));
      });
    });
    document.getElementById("diseaseFilter").addEventListener("change", render);
    document.getElementById("searchFilter").addEventListener("input", render);
    document.querySelectorAll("th[data-sort]").forEach((header) => {
      header.addEventListener("click", () => {
        const key = header.dataset.sort;
        sortState = { key, direction: sortState.key === key && sortState.direction === "asc" ? "desc" : "asc" };
        render();
      });
    });

    async function loadData() {
      for (const path of ["../data/processed/outbreaks_clean.csv", "data/processed/outbreaks_clean.csv"]) {
        try {
          const response = await fetch(path, { cache: "no-store" });
          if (response.ok) return parseCsv(await response.text());
        } catch (error) {
          console.info("CSV fetch failed", path, error);
        }
      }
      return parseCsv(fallbackCsv);
    }

    function parseCsv(csv) {
      const rows = csv.trim().split(/\r?\n/).filter(Boolean).map(parseCsvLine);
      const headers = rows.shift() || [];
      return rows.map((row) => Object.fromEntries(headers.map((header, index) => [header, coerce(row[index])])));
    }

    function parseCsvLine(line) {
      const cells = [];
      let cell = "";
      let quoted = false;
      for (let i = 0; i < line.length; i += 1) {
        const char = line[i];
        if (char === '"' && line[i + 1] === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          cells.push(cell);
          cell = "";
        } else {
          cell += char;
        }
      }
      cells.push(cell);
      return cells;
    }

    function coerce(value) {
      if (value === undefined || value === "") return null;
      if (["true", "false"].includes(String(value).toLowerCase())) return String(value).toLowerCase() === "true";
      const number = Number(value);
      return Number.isFinite(number) && String(value).trim() !== "" ? number : value;
    }

    function filteredRecords() {
      const disease = document.getElementById("diseaseFilter").value;
      const query = document.getElementById("searchFilter").value.toLowerCase().trim();
      return records.filter((record) => {
        const diseaseMatch = disease === "All diseases" || record.disease === disease;
        const haystack = [record.country, record.strain, record.source_primary, record.notes].join(" ").toLowerCase();
        return diseaseMatch && (!query || haystack.includes(query));
      });
    }

    function render() {
      const data = filteredRecords();
      renderTimeline(data);
      renderCfr(data);
      renderStrains(data);
      renderTable(data);
    }

    function renderTimeline(data) {
      const sorted = [...data].sort((a, b) => String(a.date).localeCompare(String(b.date)));
      makeChart("timelineChart", {
        type: "bar",
        data: {
          labels: sorted.map((r) => `${r.date || "Unknown"} ${r.country || ""}`),
          datasets: [
            { label: "Cases", data: sorted.map((r) => Math.min(r.confirmed_cases || 0, 5000)), backgroundColor: "rgba(47, 111, 159, 0.78)", rawValues: sorted.map((r) => r.confirmed_cases || 0) },
            { label: "Deaths", data: sorted.map((r) => Math.min(r.deaths || 0, 5000)), backgroundColor: "rgba(181, 66, 66, 0.78)", rawValues: sorted.map((r) => r.deaths || 0) }
          ]
        },
        options: chartOptions("Timeline: capped at 5,000 for scale", true)
      });
    }

    function renderCfr(data) {
      const sorted = [...data].filter((r) => Number.isFinite(r.cfr)).sort((a, b) => b.cfr - a.cfr);
      makeChart("cfrChart", {
        type: "bar",
        data: {
          labels: sorted.map((r) => `${r.disease} · ${r.country} · ${r.date || ""}`),
          datasets: [{ label: "CFR", data: sorted.map((r) => r.cfr), backgroundColor: sorted.map((r) => cfrColor(r.cfr)) }]
        },
        options: {
          ...chartOptions("Case fatality rate with Wilson confidence bounds", false),
          indexAxis: "y",
          scales: { x: { ticks: { callback: (value) => `${Math.round(value * 100)}%` }, max: 1 } },
          plugins: { tooltip: { callbacks: { label: (ctx) => `${Math.round(ctx.raw * 1000) / 10}% CFR` } } }
        }
      });
    }

    function renderStrains(data) {
      const totals = aggregate(data, "strain", "confirmed_cases");
      const counts = aggregate(data, "strain", null);
      makeChart("strainCasesChart", {
        type: "doughnut",
        data: { labels: Object.keys(totals), datasets: [{ label: "Total cases", data: Object.values(totals), backgroundColor: palette(Object.keys(totals).length) }] },
        options: chartOptions("Total cases by strain", false)
      });
      makeChart("strainCountChart", {
        type: "bar",
        data: { labels: Object.keys(counts), datasets: [{ label: "Outbreak records", data: Object.values(counts), backgroundColor: "rgba(21, 148, 126, 0.78)" }] },
        options: chartOptions("Outbreak count by strain", true)
      });
    }

    function renderTable(data) {
      const body = document.getElementById("recordsBody");
      const sorted = [...data].sort((a, b) => {
        const left = a[sortState.key] ?? "";
        const right = b[sortState.key] ?? "";
        const result = typeof left === "number" && typeof right === "number" ? left - right : String(left).localeCompare(String(right));
        return sortState.direction === "asc" ? result : -result;
      });
      body.innerHTML = sorted.map((record) => `
        <tr>
          <td>${escapeHtml(record.date || "Unknown")}</td>
          <td>${escapeHtml(record.disease || "Unknown")}</td>
          <td>${escapeHtml(record.country || "Unknown")}</td>
          <td><span class="badge">${escapeHtml(record.strain || "Unknown")}</span></td>
          <td>${formatNumber(record.confirmed_cases)}</td>
          <td>${formatNumber(record.deaths)}</td>
          <td class="cfr-cell">${cfrBar(record.cfr)}</td>
          <td class="source">${escapeHtml(record.source_primary || record.source || "Unknown")}</td>
        </tr>
      `).join("");
    }

    function makeChart(canvasId, config) {
      if (chartInstances[canvasId]) chartInstances[canvasId].destroy();
      chartInstances[canvasId] = new Chart(document.getElementById(canvasId), config);
    }

    function chartOptions(title, stacked) {
      return {
        responsive: true,
        maintainAspectRatio: false,
        scales: stacked ? { x: { stacked: false }, y: { stacked: false, beginAtZero: true } } : undefined,
        plugins: {
          title: { display: true, text: title, color: "#17202a", font: { size: 16, weight: "600" } },
          legend: { labels: { boxWidth: 14 } },
          tooltip: {
            callbacks: {
              label: (ctx) => {
                const raw = ctx.dataset.rawValues ? ctx.dataset.rawValues[ctx.dataIndex] : ctx.raw;
                return `${ctx.dataset.label}: ${formatNumber(raw)}`;
              }
            }
          }
        }
      };
    }

    function aggregate(data, key, valueKey) {
      return data.reduce((acc, record) => {
        const label = record[key] || "Unknown";
        acc[label] = (acc[label] || 0) + (valueKey ? Number(record[valueKey] || 0) : 1);
        return acc;
      }, {});
    }

    function cfrColor(value) {
      if (value >= 0.8) return "rgba(181, 66, 66, 0.85)";
      if (value >= 0.6) return "rgba(183, 121, 31, 0.85)";
      return "rgba(47, 133, 90, 0.85)";
    }

    function palette(count) {
      const colors = ["#2f6f9f", "#15947e", "#b54242", "#b7791f", "#6b5ca5", "#4d7c3b", "#8b5e3c"];
      return Array.from({ length: count }, (_, index) => colors[index % colors.length]);
    }

    function cfrBar(value) {
      if (!Number.isFinite(value)) return "n/a";
      const percent = Math.round(value * 1000) / 10;
      return `<div>${percent}%</div><div class="cfr-track"><div class="cfr-fill" style="width:${Math.min(percent, 100)}%;background:${cfrColor(value)}"></div></div>`;
    }

    function formatNumber(value) {
      return Number.isFinite(value) ? new Intl.NumberFormat().format(value) : "n/a";
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
    }

    loadData().then((loaded) => {
      records = loaded;
      const diseases = ["All diseases", ...new Set(records.map((record) => record.disease).filter(Boolean))];
      document.getElementById("diseaseFilter").innerHTML = diseases.map((disease) => `<option>${escapeHtml(disease)}</option>`).join("");
      render();
    });
  </script>
</body>
</html>
