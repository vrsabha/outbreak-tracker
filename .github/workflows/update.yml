name: Weekly outbreak data update

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --cov=transform --cov-fail-under=80

      - name: Run pipeline
        run: python main.py --skip-tests

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/*.csv data/processed/quality_report.txt data/changelog.md
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update outbreak dataset"
            git push
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `Weekly outbreak update failed: ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              "The scheduled outbreak-tracker update failed.",
              "",
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Review the failing job logs, fix the root cause, and rerun the workflow."
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["automation", "data-update-failure"]
            });
